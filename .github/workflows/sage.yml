name: SAGE Remediation

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "remediate"
        type: choice
        options:
          - remediate
          - enforce
          - metrics
          - check

jobs:
  # -------------------------------------------------------------------
  # Test: always run tests first
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest -q
      - name: Run tests
        run: python -m pytest tests/ -q

  # -------------------------------------------------------------------
  # Check: validate configuration and connectivity
  # -------------------------------------------------------------------
  check:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'check'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest -q
      - name: Run health check
        run: python -m sage check
        env:
          DEVIN_MODE: ${{ secrets.DEVIN_API_KEY && 'real' || 'stub' }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          PR_MODE: ${{ secrets.GITHUB_TOKEN && 'github' || 'stub' }}
          NOTIFY_MODE: ${{ secrets.SLACK_WEBHOOK_URL && 'slack' || 'stub' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------
  # Remediate: process new CodeQL findings
  # -------------------------------------------------------------------
  remediate:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'remediate' ||
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch CodeQL alerts
        id: fetch
        run: |
          mkdir -p sarif-output
          gh api "repos/${{ github.repository }}/code-scanning/alerts?state=open" \
            --jq 'length' > /tmp/alert_count 2>/dev/null || echo "0" > /tmp/alert_count
          ALERT_COUNT=$(cat /tmp/alert_count)
          echo "alert_count=$ALERT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $ALERT_COUNT CodeQL alert(s)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run SAGE pipeline
        run: |
          if [ "${{ steps.fetch.outputs.alert_count }}" -gt "0" ] 2>/dev/null; then
            echo "Processing CodeQL alerts..."
            python -m sage batch sarif-output/
          else
            echo "No alerts. Running fixture demo..."
            python -m sage batch demo/fixtures/
          fi
        env:
          DEVIN_MODE: ${{ secrets.DEVIN_API_KEY && 'real' || 'stub' }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          PR_MODE: github
          NOTIFY_MODE: ${{ secrets.SLACK_WEBHOOK_URL && 'slack' || 'stub' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run enforcement
        run: python -m sage enforce

      - name: Display metrics
        run: python -m sage metrics

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            pipeline.db

  # -------------------------------------------------------------------
  # Enforce: hourly SLA + KPI enforcement
  # -------------------------------------------------------------------
  enforce:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'enforce'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest -q

      - name: Download pipeline DB
        uses: actions/download-artifact@v4
        with:
          pattern: sage-artifacts-*
          merge-multiple: true
          path: .
        continue-on-error: true

      - name: Run enforcement
        run: python -m sage enforce

      - name: Display metrics
        run: python -m sage metrics

      - name: Upload updated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            pipeline.db

  # -------------------------------------------------------------------
  # Metrics: on-demand KPI display
  # -------------------------------------------------------------------
  metrics:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'metrics'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download pipeline DB
        uses: actions/download-artifact@v4
        with:
          pattern: sage-artifacts-*
          merge-multiple: true
          path: .
        continue-on-error: true

      - name: Display metrics
        run: python -m sage metrics
